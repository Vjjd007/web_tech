services:
  - type: web
    name: studenthub-server
    env: node
    plan: free
    region: oregon
    repo: "https://github.com/Vjjd007/web_tech"
    branch: main
    root: server
    buildCommand: "npm install"
    startCommand: "node index.js"
    envVars:
      - key: PORT
        value: "5000"
      - key: SUPABASE_URL
        fromSecret: SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromSecret: SUPABASE_SERVICE_ROLE_KEY
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: AI_API_KEY
        fromSecret: AI_API_KEY
      - key: AI_API_URL
        fromSecret: AI_API_URL
      - key: AI_MODEL
        fromSecret: AI_MODEL
      - key: ALLOWED_ORIGINS
        value: "https://vjjd007.github.io,https://studenthub-live.vercel.app"
